<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Todo Card</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f4f4;
  display: flex;
  justify-content: center;
  padding: 20px;
}

article {
  background: white;
  width: 100%;
  max-width: 450px;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  border-left: 6px solid red;
}

/* PRIORITY */
.high { border-left-color: red; }
.medium { border-left-color: orange; }
.low { border-left-color: green; }

/* DONE */
.done {
  text-decoration: line-through;
  color: gray;
}

/* STATUS */
.inprogress { color: #007bff; }

/* OVERDUE */
.overdue {
  color: red;
  font-weight: bold;
}

/* COLLAPSE */
.collapsed {
  max-height: 40px;
  overflow: hidden;
}

/* TAGS */
.tags {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-top: 10px;
}

.tag {
  background: #eee;
  padding: 5px 8px;
  border-radius: 6px;
  font-size: 12px;
}

/* BUTTONS */
button {
  margin-top: 10px;
  margin-right: 10px;
  padding: 8px 10px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

button:focus {
  outline: 2px solid blue;
}

/* EDIT FORM */
.hidden { display: none; }

form {
  margin-top: 15px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

@media (max-width: 600px) {
  article { padding: 15px; }
}
</style>
</head>

<body>

<article data-testid="test-todo-card" id="card" class="high">

<!-- Checkbox -->
<label>
<input type="checkbox" id="checkbox" data-testid="test-todo-complete-toggle">
Mark as complete
</label>

<!-- Title -->
<h3 data-testid="test-todo-title" id="title">
Finish Portfolio Design
</h3>

<!-- STATUS CONTROL -->
<label for="statusControl">Status:</label>
<select id="statusControl" data-testid="test-todo-status-control">
<option>Pending</option>
<option>In Progress</option>
<option>Done</option>
</select>

<!-- Status display -->
<span data-testid="test-todo-status" id="status">Pending</span>

<!-- EXPAND -->
<button 
data-testid="test-todo-expand-toggle" 
id="expandBtn"
aria-expanded="false"
aria-controls="descBox"
> 
Expand
</button>

<!-- Description -->
<div 
id="descBox" 
data-testid="test-todo-collapsible-section" 
class="collapsed"
> 
<pdata-testid="test-todo-description" id="desc">
Complete the UI design for the landing page and mobile view. This is extended text to demonstrate collapsing behavior properly.
</p>
</div>

<!-- PRIORITY -->
<div data-testid="test-todo-priority-indicator">
<span class="badge high" data-testid="test-todo-priority" id="priorityText">
High
</span>
</div>

<!-- TIME -->
<time data-testid="test-todo-due-date" id="dueDate"></time><br>

<time 
data-testid="test-todo-time-remaining" 
id="timeRemaining" 
aria-live="polite"
></time>

<div data-testid="test-todo-overdue-indicator" id="overdue"></div>

<!-- TAGS -->
<ul class="tags" data-testid="test-todo-tags">
<li class="tag" data-testid="test-todo-tag-work">Work</li>
<li class="tag" data-testid="test-todo-tag-urgent">Urgent</li>
<li class="tag">Design</li>
</ul>

<!-- BUTTONS -->
<button class="edit" data-testid="test-todo-edit-button" id="editBtn">Edit</button>
<button class="delete" data-testid="test-todo-delete-button">Delete</button>

<!-- EDIT FORM -->
<form data-testid="test-todo-edit-form" id="editForm" class="hidden">

<label for="editTitle">Title</label>
<input id="editTitle" data-testid="test-todo-edit-title-input">

<label for="editDesc">Description</label>
<textarea id="editDesc" data-testid="test-todo-edit-description-input"></textarea>

<label for="editPriority">Priority</label>
<select id="editPriority" data-testid="test-todo-edit-priority-select">
<option>Low</option>
<option>Medium</option>
<option>High</option>
</select>

<label for="editDate">Due Date</label>
<input type="datetime-local" id="editDate" data-testid="test-todo-edit-due-date-input">

<button type="button" data-testid="test-todo-save-button" id="saveBtn">Save</button>
<button type="button" data-testid="test-todo-cancel-button" id="cancelBtn">Cancel</button>

</form>

</article>

<script>
// STATE
let dueDate = new Date(Date.now() + 2*24*60*60*1000)

// ELEMENTS
const dueDateEl = document.getElementById("dueDate");
const timeRemainingEl = document.getElementById("timeRemaining");
const overdueEl = document.getElementById("overdue");

const checkbox = document.getElementById("checkbox");
const title = document.getElementById("title");
const status = document.getElementById("status");
const statusControl = document.getElementById("statusControl");
const card = document.getElementById("card");

const descBox = document.getElementById("descBox");
const expandBtn = document.getElementById("expandBtn");

const editForm = document.getElementById("editForm");

// DATE DISPLAY
dueDateEl.textContent = "Due " + dueDate.toDateString();

// TIME LOGIC
function updateTime() {
  if (status.textContent === "Done") {
    timeRemainingEl.textContent = "Completed";
    overdueEl.textContent = "";
    return;
  }

  const now = new Date();
  const diff = dueDate - now;

  if (diff <= 0) {
    overdueEl.textContent = "⚠️ Overdue";
    overdueEl.classList.add("overdue");
    timeRemainingEl.textContent = "Overdue!";
    return;
  }

  const mins = Math.floor(diff / 60000);
  const hours = Math.floor(mins / 60);
  const days = Math.floor(hours / 24);

  if (days > 0) {
    timeRemainingEl.textContent = `Due in ${days} days`;
  } else if (hours > 0) {
    timeRemainingEl.textContent = `Due in ${hours} hours`;
  } else {
    timeRemainingEl.textContent = `Due in ${mins} minutes`;
  }
}

setInterval(updateTime, 60000);
updateTime();

// EXPAND
expandBtn.onclick = () => {
  descBox.classList.toggle("collapsed");
  const expanded = !descBox.classList.contains("collapsed");
  expandBtn.setAttribute("aria-expanded", expanded);
  expandBtn.textContent = expanded ? "Collapse" : "Expand";
};

// STATUS + CHECKBOX SYNC
checkbox.onchange = () => {
  statusControl.value = checkbox.checked ? "Done" : "Pending";
  status.textContent = statusControl.value;
  title.classList.toggle("done", checkbox.checked);
};

statusControl.onchange = () => {
  const val = statusControl.value;
  status.textContent = val;

  checkbox.checked = val === "Done";
  title.classList.toggle("done", val === "Done");

  card.classList.toggle("inprogress", val === "In Progress");
};

// EDIT MODE
document.getElementById("editBtn").onclick = () => {
  editForm.classList.remove("hidden");

  editTitle.value = title.textContent;
  editDesc.value = desc.textContent;
};

cancelBtn.onclick = () => {
  editForm.classList.add("hidden");
};

saveBtn.onclick = () => {
  title.textContent = editTitle.value;
  desc.textContent = editDesc.value;

  const pr = editPriority.value;
  priorityText.textContent = pr;

  card.className = pr.toLowerCase();

  dueDate = new Date(editDate.value);

  editForm.classList.add("hidden");
};

</script>

</body>
</html>
